<div class="login-wrapper">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-icon">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h2>Espace Administrateur</h2>
        <p>Connectez-vous pour accéder au tableau de bord</p>
      </div>
      
      <form [formGroup]="adminForm" (ngSubmit)="log()" class="login-form">
        <div class="form-group">
          <label class="form-label">
            <i class="fa-solid fa-user"></i>
            Identifiant
          </label>
          <input type="text" class="form-input" formControlName="identifiant" 
                 placeholder="Entrez votre identifiant" />
        </div>

        <div class="form-group">
          <label class="form-label">
            <i class="fa-solid fa-lock"></i>
            Mot de passe
          </label>
          <input type="password" class="form-input" formControlName="password" 
                 placeholder="Entrez votre mot de passe" />
        </div>

        <button type="submit" class="login-btn">
          <span>Se connecter</span>
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>
    </div>
    
    <div class="login-image">
      <img src="../../../../assets/images/albatros.jpeg" alt="Albatros" />
      <div class="image-overlay">
        <h3>Résidence Albatros</h3>
        <p>Gestion simplifiée de vos réservations</p>
      </div>
    </div>
  </div>
</div>
