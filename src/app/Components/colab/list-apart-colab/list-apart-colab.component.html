<div class="dashboard-container">
  <!-- Header Section -->
  <div class="dashboard-header">
    <h1 class="page-title">
      <i class="fa-solid fa-calendar-days"></i>
      Mes Réservations
    </h1>
    <div class="user-menu">
      <button class="user-btn" (click)="disconnect()">
        <i class="fa-solid fa-right-from-bracket"></i>
        Déconnexion
      </button>
    </div>
  </div>

  <!-- Legend Card -->
  <div class="legend-card">
    <h3 class="legend-title">Légende des statuts</h3>
    <div class="legend-items">
      <div class="legend-item">
        <span class="legend-dot available"></span>
        <span class="legend-text">Disponible</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot in-progress"></span>
        <span class="legend-text">En cours</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot paid"></span>
        <span class="legend-text">Payé</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot avance"></span>
        <span class="legend-text">Avance</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot amicale"></span>
        <span class="legend-text">Amicale</span>
      </div>
    </div>
  </div>

  <!-- Main Table -->
  <div class="table-card">
    <div class="table-responsive">
      <table class="data-table">
        <thead>
          <tr>
            <th class="sticky-col code-col">Code</th>
            <th class="sticky-col desc-col">Description</th>
            <th *ngFor="let c of availabilities" class="date-col">
              <div class="date-header">
                <span class="date-range">{{c?.dateDeb | date:'dd/MM'}}</span>
                <span class="date-separator">→</span>
                <span class="date-range">{{c?.dateFin | date:'dd/MM'}}</span>
              </div>
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let a of calenders">
            <td class="sticky-col code-col">
              <span class="apartment-code">{{ a?.appartement.code }}</span>
            </td>
            <td class="sticky-col desc-col">
              <span class="apartment-desc">{{a?.appartement.description}}</span>
            </td>
            <ng-container *ngFor="let availability of a.calendrier.availabilities">
              <td class="status-cell"
                  [ngClass]="{ 
                    'available': availability.available,
                    'paid': availability.status === 'Payé',
                    'in-progress': availability.status === 'En cours',
                    'amicale': availability.status === 'Amicale',
                    'avance': availability.status === 'Avance',
                    'not-mine': availability.persId !== '' && availability.persId !== colaborateur
                  }"
                  [routerLink]="['../colabApart',a?.appartement._id,availability.dateDeb,availability._id,availability.dateFin,a?.appartement.code]">
                <span *ngIf="availability.persId == colaborateur && availability.nom != ''" class="cell-content">
                  {{availability.nom}}
                </span>
                <span *ngIf="availability.nom == ''" class="cell-content price-only">
                  {{availability.price}} DT
                </span>
              </td>
            </ng-container>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
