<div class="detail-container">
  <!-- Back Button & Header -->
  <div class="detail-header">
    <button class="back-btn" routerLink="/colabdash">
      <i class="fa-solid fa-arrow-left"></i>
      Retour
    </button>
    <div class="header-info">
      <h1 class="page-title">{{cod}}</h1>
      <span class="date-badge">
        <i class="fa-regular fa-calendar"></i>
        {{datede | date:'dd/MM'}} au {{dateFin | date:'dd/MM'}}
      </span>
    </div>
  </div>

  <!-- New Reservation Form -->
  <div class="section-card" *ngIf="showForm">
    <h2 class="section-title">
      <i class="fa-solid fa-calendar-plus"></i>
      Nouvelle Réservation
    </h2>
    
    <form [formGroup]="reservForm" (ngSubmit)="reser()" class="reservation-form">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Prénom</label>
          <input type="text" class="form-input" formControlName="firstName" placeholder="Entrez le prénom">
        </div>
        <div class="form-group">
          <label class="form-label">Nom</label>
          <input type="text" class="form-input" formControlName="lastName" placeholder="Entrez le nom">
        </div>
        <div class="form-group">
          <label class="form-label">CIN</label>
          <input type="text" class="form-input" formControlName="cin" placeholder="Numéro CIN">
        </div>
        <div class="form-group">
          <label class="form-label">Téléphone</label>
          <input type="text" class="form-input" formControlName="ntel" placeholder="Numéro de téléphone">
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Statut</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" value="En cours" formControlName="status">
            <span class="radio-label in-progress">En cours</span>
          </label>
          <label class="radio-option">
            <input type="radio" value="Avance" formControlName="status">
            <span class="radio-label avance">Avance</span>
          </label>
          <label class="radio-option">
            <input type="radio" value="Payé" formControlName="status">
            <span class="radio-label paid">Payé</span>
          </label>
          <label class="radio-option">
            <input type="radio" value="Amicale" formControlName="status">
            <span class="radio-label amicale">Amicale</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Remarque</label>
        <input type="text" class="form-input" formControlName="remarque" placeholder="Ajouter une remarque (optionnel)">
      </div>

      <button type="submit" class="submit-btn">
        <i class="fa-solid fa-check"></i>
        Confirmer la réservation
      </button>
    </form>
  </div>

  <!-- Existing Reservation Details -->
  <div *ngIf="adminres" class="section-card">
    <h2 class="section-title">
      <i class="fa-solid fa-user-check"></i>
      Détails de la Réservation
    </h2>
    
    <form [formGroup]="modifFormAdmin" (ngSubmit)="modifadmin()" class="reservation-form">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Prénom</label>
          <input type="text" class="form-input" formControlName="firstName">
        </div>
        <div class="form-group">
          <label class="form-label">Nom</label>
          <input type="text" class="form-input" formControlName="lastName">
        </div>
        <div class="form-group">
          <label class="form-label">CIN</label>
          <input type="text" class="form-input" formControlName="cin">
        </div>
        <div class="form-group">
          <label class="form-label">Téléphone</label>
          <input type="text" class="form-input" formControlName="ntel">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Statut</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" value="En cours" formControlName="status">
            <span class="radio-label in-progress">En cours</span>
          </label>
          <label class="radio-option">
            <input type="radio" value="Avance" formControlName="status">
            <span class="radio-label avance">Avance</span>
          </label>
          <label class="radio-option">
            <input type="radio" value="Payé" formControlName="status">
            <span class="radio-label paid">Payé</span>
          </label>
          <label class="radio-option">
            <input type="radio" value="Amicale" formControlName="status">
            <span class="radio-label amicale">Amicale</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Remarque</label>
        <input type="text" class="form-input" formControlName="remarque">
      </div>

      <div class="button-group">
        <button type="submit" class="submit-btn success">
          <i class="fa-solid fa-save"></i>
          Modifier
        </button>
        <button type="button" class="submit-btn danger" (click)="annuler1()">
          <i class="fa-solid fa-times"></i>
          Annuler la réservation
        </button>
      </div>
    </form>
  </div>
</div>
